<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OILIVE — Product</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <meta name="description" content="Single-origin, cold-pressed extra virgin olive oil from the Aegean.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:      #FAFAF7;
      --bg-alt:  #F2F1EB;
      --bg-dark: #1A1A1A;
      --ink:     #1A1A1A;
      --ink-65:  rgba(26,26,26,0.65);
      --ink-40:  rgba(26,26,26,0.40);
      --ink-25:  rgba(26,26,26,0.25);
      --ink-12:  rgba(26,26,26,0.12);
      --ink-08:  rgba(26,26,26,0.08);
      --green:   #556B2F;
      --green-d: #1F3B1F;
    }
    [data-theme="dark"] {
      --bg:      #0B160B;
      --bg-alt:  #101E10;
      --bg-dark: #060E06;
      --ink:     #FAFAF7;
      --ink-65:  rgba(250,250,247,0.65);
      --ink-40:  rgba(250,250,247,0.40);
      --ink-25:  rgba(250,250,247,0.25);
      --ink-12:  rgba(250,250,247,0.12);
      --ink-08:  rgba(250,250,247,0.08);
      --green:   #7A9B3F;
      --green-d: #556B2F;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: 'Instrument Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      cursor: none;
      transition: background 0.5s, color 0.5s;
    }
    a { color: var(--green); text-decoration: none; }
    ::selection { background: var(--green); color: #FAFAF7; }
    @media (pointer: coarse) { body { cursor: auto; } #cursor { display: none !important; } }

    #cursor { position: fixed; top:0; left:0; width:16px; height:20px; pointer-events:none; z-index:9999; will-change:transform; }
    #cursor svg { display:block; overflow:visible; transform-origin:50% 60%; transition:transform 0.25s cubic-bezier(.2,.8,.3,1); }
    #cursor.hovering svg { transform: scale(1.4); }
    #cursor.pressed svg { transform: scale(0.7,1.2); }
    #cursor.hovering.pressed svg { transform: scale(1.05,1.3); }
    #cursor .olive-body { fill: var(--green); transition: fill 0.4s; }
    #cursor .olive-stem { fill: var(--green-d); transition: fill 0.4s; }
    #cursor .olive-shine { fill: rgba(255,255,255,0.4); }

    #theme-toggle {
      position: fixed; top: 28px; right: 28px; z-index: 7000;
      width: 46px; height: 26px; border: 1px solid var(--ink-25); border-radius: 13px;
      background: transparent; cursor: pointer; padding: 0; display: flex; align-items: center;
      transition: border-color 0.3s;
    }
    #theme-toggle::after {
      content: ''; display: block; width: 18px; height: 18px; border-radius: 50%;
      background: var(--ink); margin-left: 3px; transition: transform 0.3s ease, background 0.3s;
    }
    [data-theme="dark"] #theme-toggle::after { transform: translateX(20px); background: var(--green); }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 32px clamp(24px, 8vw, 120px);
    }
    header img { width: 108px; height: auto; transition: filter 0.4s; }
    .back-link {
      font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--ink-65); transition: color 0.2s; margin-right: 76px;
    }
    .back-link:hover { color: var(--green); }

    main {
      display: grid;
      grid-template-columns: minmax(280px, 460px) 1fr;
      gap: clamp(40px, 6vw, 100px);
      align-items: start;
      padding: 20px clamp(24px, 8vw, 120px) 60px;
      max-width: 1280px;
      margin: 0 auto;
    }
    @media (max-width: 860px) { main { grid-template-columns: 1fr; } }

    .product-visual {
      position: sticky; top: 40px;
      display: flex; justify-content: center;
      background: var(--bg-alt);
    }
    .product-visual img { width: 100%; max-width: 380px; height: auto; display: block; }
    @media (max-width: 860px) { .product-visual { position: static; } }

    .product-no { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-40); }
    .product-title {
      margin: 18px 0 0;
      font-family: 'Playfair Display', serif; font-weight: 500;
      font-size: clamp(34px, 4.4vw, 58px); line-height: 1.1; letter-spacing: -0.01em;
    }
    .product-size {
      margin-top: 12px; display: inline-block;
      font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--green); font-weight: 600;
    }
    .product-desc {
      margin: 30px 0 0; font-size: 16px; line-height: 1.85; color: var(--ink-65);
      max-width: 56ch; text-wrap: pretty;
    }
    .product-notes {
      margin: 36px 0 0; padding: 30px 0 0; border-top: 1px solid var(--ink-08);
    }
    .product-notes h3 {
      margin: 0 0 16px; font-family: 'Playfair Display', serif; font-weight: 500;
      font-size: 20px; font-style: italic; color: var(--green);
    }
    .product-notes p { margin: 0; font-size: 14.5px; line-height: 1.8; color: var(--ink-65); max-width: 56ch; }

    .product-specs {
      margin: 36px 0 0; padding: 30px 0 0; border-top: 1px solid var(--ink-08);
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 22px;
    }
    .spec-block { display: flex; flex-direction: column; gap: 6px; }
    .spec-block .v { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--green); }
    .spec-block .l { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-40); }

    .product-cta {
      margin-top: 44px; display: flex; flex-wrap: wrap; align-items: center; gap: 24px;
    }
    .product-cta a.button {
      display: inline-block; background: var(--green); color: #FAFAF7;
      font-size: 12px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
      padding: 16px 32px; transition: background 0.2s, transform 0.4s cubic-bezier(.2,.8,.2,1);
    }
    .product-cta a.button:hover { background: var(--green-d); color: #FAFAF7; }
    .product-cta .price-note { font-size: 11px; color: var(--ink-40); letter-spacing: 0.06em; }

    .other-bottles {
      border-top: 1px solid var(--ink-08);
      padding: 70px clamp(24px, 8vw, 120px) 90px;
      text-align: center;
    }
    .other-bottles h4 {
      margin: 0 0 32px; font-family: 'Playfair Display', serif; font-weight: 500;
      font-size: clamp(20px, 2.4vw, 28px);
    }
    .other-grid {
      display: flex; justify-content: center; gap: clamp(24px, 5vw, 56px); flex-wrap: wrap;
    }
    .other-item { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 140px; }
    .other-item img { width: 90px; height: auto; }
    .other-item span { font-size: 12px; letter-spacing: 0.06em; color: var(--ink-65); }
    .other-item:hover span { color: var(--green); }

    footer {
      border-top: 1px solid var(--ink-08);
      padding: 48px clamp(24px, 8vw, 120px);
      display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 24px;
    }
    footer img { width: 92px; height: auto; transition: filter 0.4s; }
    .footer-link { color: var(--ink); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; transition: color 0.2s; }
    .footer-link:hover { color: var(--green); }
  </style>
</head>
<body>

<div id="cursor">
  <svg viewBox="0 0 20 26" width="16" height="20">
    <rect class="olive-stem" x="8.4" y="0" width="3.2" height="6" rx="1.6"/>
    <ellipse class="olive-body" cx="10" cy="15.5" rx="8" ry="10"/>
    <ellipse class="olive-shine" cx="7" cy="10.8" rx="2.2" ry="3"/>
  </svg>
</div>

<button id="theme-toggle" aria-label="Toggle dark mode"></button>

<header>
  <a href="index.html" aria-label="OILIVE home"><img id="header-logo" src="assets/oilive-logo.png" alt="OILIVE"></a>
  <a class="back-link" href="collection.html">&larr; Collection</a>
</header>

<main id="product-main"></main>

<section class="other-bottles">
  <h4>The rest of the collection</h4>
  <div class="other-grid" id="other-grid"></div>
</section>

<footer>
  <img id="footer-logo" src="assets/oilive-logo.png" alt="OILIVE">
  <div style="display:flex;flex-direction:column;gap:14px;align-items:center;">
    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:28px;">
      <a href="collection.html" class="footer-link">Collection</a>
      <a href="https://www.instagram.com/oilive.co" target="_blank" rel="noopener" class="footer-link">Instagram</a>
      <a href="mailto:hello@oilive.co" class="footer-link">Contact</a>
    </div>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:28px;">
      <a href="privacy.html" class="footer-link">Privacy</a>
      <a href="terms.html" class="footer-link">Terms</a>
    </div>
  </div>
  <span style="font-size:11px;color:var(--ink-40);letter-spacing:0.08em;">© 2026 OILIVE. All rights reserved.</span>
</footer>

<script>
(function () {
  var PRODUCTS = {
    'first-pressing': {
      no: 'No. 01', name: 'The First Pressing', size: '500 ml — Early Harvest',
      img: 'assets/product-first-pressing.jpg',
      desc: 'Memecik olives picked green in late October, pressed within four hours of coming off the tree. This is the most intense expression of the grove — vivid, peppery, unapologetic. The taste of a harvest that refused to wait for anything, including ripeness.',
      notes: 'Fresh-cut grass and green almond on the nose. A sharp, peppery finish that catches at the back of the throat — the polyphenol bite of a very young oil. Best finished raw over vegetables or bread, not heated.',
      specs: [['&lt; 0.3%','Acidity'], ['&gt; 400 mg/kg','Polyphenols'], ["Oct '25",'Harvest'], ['500 ml','Format']]
    },
    'old-grove': {
      no: 'No. 02 — Numbered bottles', name: 'The Old Grove', size: '250 ml — Limited Reserve',
      img: 'assets/product-old-grove.jpg',
      desc: "A single day's pressing from our oldest trees, some more than a hundred years old. Lower yield, deeper character. Each bottle is numbered by hand and the run does not repeat the following year — every harvest of the old grove is its own vintage.",
      notes: 'Rounder and quieter than the First Pressing — ripe stone fruit, a whisper of almond, a long, warm finish instead of a sharp one. Made for tasting on its own, a spoonful at a time.',
      specs: [['&lt; 0.25%','Acidity'], ['100+ yrs','Trees'], ['Limited','Run'], ['250 ml','Format']]
    },
    'table': {
      no: 'No. 03', name: 'The Table', size: '750 ml — Everyday Pressing',
      img: 'assets/product-table.jpg',
      desc: "The same grove, the same standards, in the format built for daily use. Made for kitchens where olive oil isn't an occasion but a habit — finishing, roasting, frying, and everything in between.",
      notes: 'Smooth and rounded with ripe fruit character and a mild, forgiving finish — built to be used generously, not rationed. Holds up well to heat.',
      specs: [['&lt; 0.4%','Acidity'], ['Ripe fruit','Profile'], ['Dark glass','Format'], ['750 ml','Size']]
    }
  };
  var ORDER = ['first-pressing', 'old-grove', 'table'];

  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  if (!PRODUCTS[id]) id = 'first-pressing';
  var p = PRODUCTS[id];

  document.title = p.name + ' — OILIVE';

  var main = document.getElementById('product-main');
  main.innerHTML =
    '<div class="product-visual"><img src="' + p.img + '" alt="' + p.name + '"></div>' +
    '<div>' +
      '<span class="product-no">' + p.no + '</span>' +
      '<h1 class="product-title">' + p.name + '</h1>' +
      '<span class="product-size">' + p.size + '</span>' +
      '<p class="product-desc">' + p.desc + '</p>' +
      '<div class="product-notes"><h3>Tasting Notes</h3><p>' + p.notes + '</p></div>' +
      '<div class="product-specs">' + p.specs.map(function (s) {
        return '<div class="spec-block"><span class="v">' + s[0] + '</span><span class="l">' + s[1] + '</span></div>';
      }).join('') + '</div>' +
      '<div class="product-cta">' +
        '<a class="button" data-magnetic href="index.html#notify">Notify me at launch</a>' +
        '<span class="price-note">Pricing revealed at launch</span>' +
      '</div>' +
    '</div>';

  var grid = document.getElementById('other-grid');
  ORDER.filter(function (k) { return k !== id; }).forEach(function (k) {
    var o = PRODUCTS[k];
    var a = document.createElement('a');
    a.className = 'other-item';
    a.href = 'product.html?id=' + k;
    a.innerHTML = '<img src="' + o.img + '" alt="' + o.name + '"><span>' + o.name + '</span>';
    grid.appendChild(a);
  });

  /* Theme */
  var html = document.documentElement;
  var toggleBtn = document.getElementById('theme-toggle');
  var logoDarkFilter = 'invert(1) hue-rotate(180deg) brightness(1.05)';
  var logos = [document.getElementById('header-logo'), document.getElementById('footer-logo')];
  function applyTheme(t) {
    html.setAttribute('data-theme', t);
    logos.forEach(function (l) { if (l) l.style.filter = t === 'dark' ? logoDarkFilter : ''; });
  }
  applyTheme(localStorage.getItem('oilive-theme') || 'light');
  toggleBtn.addEventListener('click', function () {
    var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    localStorage.setItem('oilive-theme', next);
    applyTheme(next);
  });

  /* Cursor */
  var cursor = document.getElementById('cursor');
  var cx = -100, cy = -100, tx = -100, ty = -100;
  document.addEventListener('mousemove', function (e) { tx = e.clientX; ty = e.clientY; });
  (function animCursor() {
    requestAnimationFrame(animCursor);
    cx += (tx - cx) * 0.16;
    cy += (ty - cy) * 0.16;
    cursor.style.transform = 'translate(' + (cx - cursor.offsetWidth / 2) + 'px,' + (cy - cursor.offsetHeight / 2) + 'px)';
  })();
  document.addEventListener('mousedown', function () { cursor.classList.add('pressed'); });
  document.addEventListener('mouseup', function () { cursor.classList.remove('pressed'); });
  document.querySelectorAll('a, button').forEach(function (el) {
    el.addEventListener('mouseenter', function () { cursor.classList.add('hovering'); });
    el.addEventListener('mouseleave', function () { cursor.classList.remove('hovering'); });
  });

  /* Magnetic */
  document.querySelectorAll('[data-magnetic]').forEach(function (btn) {
    btn.style.transition = 'transform 0.4s cubic-bezier(.2,.8,.2,1)';
    btn.addEventListener('mousemove', function (e) {
      var r = btn.getBoundingClientRect();
      var mx = e.clientX - (r.left + r.width / 2);
      var my = e.clientY - (r.top + r.height / 2);
      btn.style.transform = 'translate(' + (mx * 0.3) + 'px,' + (my * 0.3) + 'px)';
    });
    btn.addEventListener('mouseleave', function () { btn.style.transform = ''; });
  });
})();
</script>

<!-- Vercel Web Analytics -->
<script defer src="/_vercel/insights/script.js"></script>

</body>
</html>
